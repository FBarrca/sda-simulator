    .grid { stroke: #e2e8f0; stroke-width: 1; }
    
    .bar-track { fill: #f1f5f9; }
    .bar-rop.initial { fill: #94a3b8; }
    .bar-excess.initial { fill: #cbd5e1; }
    .bar-rop.published { fill: #1d4ed8; }
    .bar-excess.published { fill: #93c5fd; }
